<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5b21b6"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#07070f"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- design system grid -->
  <g transform="translate(80, 60)">
    <!-- swatches -->
    <rect width="640" height="80" rx="10" fill="#0d0d1a"/>
    <circle cx="30"  cy="40" r="22" fill="#00d4ff"/>
    <circle cx="80"  cy="40" r="22" fill="#a855f7"/>
    <circle cx="130" cy="40" r="22" fill="#5b21b6"/>
    <circle cx="180" cy="40" r="22" fill="#10b981"/>
    <circle cx="230" cy="40" r="22" fill="#f59e0b"/>
    <circle cx="280" cy="40" r="22" fill="#ef4444"/>
    <rect x="330" y="22" width="290" height="14" rx="3" fill="#fff" opacity="0.7"/>
    <rect x="330" y="42" width="200" height="10" rx="2" fill="#fff" opacity="0.4"/>
    <!-- components -->
    <g transform="translate(0, 100)">
      <rect width="200" height="240" rx="10" fill="#0d0d1a"/>
      <rect x="20" y="20" width="160" height="40" rx="8" fill="url(#g)"/>
      <rect x="20" y="80" width="160" height="14" rx="3" fill="#fff" opacity="0.6"/>
      <rect x="20" y="100" width="120" height="10" rx="2" fill="#fff" opacity="0.3"/>
      <rect x="20" y="120" width="140" height="10" rx="2" fill="#fff" opacity="0.3"/>
      <rect x="20" y="140" width="160" height="60" rx="8" fill="#13132a"/>
      <rect x="35" y="160" width="50" height="8" rx="2" fill="#fff" opacity="0.6"/>
      <rect x="35" y="175" width="120" height="6" rx="2" fill="#fff" opacity="0.3"/>
    </g>
    <g transform="translate(220, 100)">
      <rect width="200" height="240" rx="10" fill="#0d0d1a"/>
      <circle cx="100" cy="70" r="36" fill="url(#g)"/>
      <rect x="20" y="120" width="160" height="14" rx="3" fill="#fff" opacity="0.6"/>
      <rect x="50" y="140" width="100" height="10" rx="2" fill="#fff" opacity="0.3"/>
      <rect x="20" y="170" width="160" height="50" rx="8" fill="#13132a"/>
      <rect x="40" y="190" width="60" height="10" rx="2" fill="#fff" opacity="0.5"/>
    </g>
    <g transform="translate(440, 100)">
      <rect width="200" height="240" rx="10" fill="#0d0d1a"/>
      <rect x="20" y="20" width="160" height="60" rx="8" fill="url(#g)" opacity="0.6"/>
      <rect x="20" y="100" width="100" height="14" rx="3" fill="#fff" opacity="0.6"/>
      <rect x="20" y="120" width="140" height="10" rx="2" fill="#fff" opacity="0.3"/>
      <rect x="20" y="150" width="70" height="36" rx="8" fill="url(#g)"/>
      <rect x="100" y="150" width="80" height="36" rx="8" fill="#13132a"/>
    </g>
  </g>
  <text x="400" y="470" font-family="Space Grotesk, sans-serif" font-size="22" font-weight="700" text-anchor="middle" fill="#ffffff">Fintech Design System</text>
</svg>
